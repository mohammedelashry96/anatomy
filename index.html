<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anatomy 2 — Head, Neck &amp; Neuroanatomy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=Spline+Sans+Mono:wght@400;500;600&family=Noto+Kufi+Arabic:wght@400;500;600;700&family=Noto+Naskh+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#f4f1e9;--paper-2:#ece7db;--card:#fbf9f4;
  --ink:#1c2532;--ink-soft:#4a5566;--line:#d8d0bf;--line-strong:#c3b8a0;
  --nerve:#c9a227;--artery:#b23a48;--vein:#2a7f8e;--bone:#8a7a55;--muscle:#a4503c;--key:#1c2532;
  --accent:#2a7f8e;--accent-ink:#1d5b66;
  --good:#3f7d54;--good-bg:#e7f0e6;--bad:#b23a48;--bad-bg:#f6e6e5;
  --shadow:0 1px 2px rgba(28,37,50,.06),0 8px 24px rgba(28,37,50,.06);
  --disp:"Fraunces",serif;--body:"Inter",system-ui,sans-serif;--mono:"Spline Sans Mono",monospace;
}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{margin:0;background:var(--paper);color:var(--ink);font-family:var(--body);line-height:1.55;-webkit-font-smoothing:antialiased}
body::before{content:"";position:fixed;inset:0;pointer-events:none;z-index:0;opacity:.5;
  background-image:radial-gradient(rgba(140,122,85,.06) 1px,transparent 1px);background-size:22px 22px}
/* Arabic fonts when RTL */
[dir="rtl"]{--disp:"Noto Kufi Arabic",serif;--body:"Noto Naskh Arabic",system-ui,sans-serif}
[dir="rtl"] body,[dir="rtl"] .fc-a,[dir="rtl"] .note-block li{font-family:var(--body)}
.t-nerve,.t-artery,.t-vein,.t-bone,.t-muscle,.t-key{unicode-bidi:isolate}
.wrap{max-width:1080px;margin:0 auto;padding:0 20px;position:relative;z-index:1}

header{position:sticky;top:0;z-index:50;background:rgba(244,241,233,.9);backdrop-filter:blur(8px);border-bottom:1px solid var(--line)}
.bar{display:flex;align-items:center;gap:14px;height:62px}
.brand{display:flex;align-items:baseline;gap:10px;cursor:pointer;user-select:none}
.brand b{font-family:var(--disp);font-weight:600;font-size:20px;letter-spacing:-.01em}
.brand span{font-family:var(--mono);font-size:11px;color:var(--ink-soft);border:1px solid var(--line-strong);padding:2px 6px;border-radius:4px}
nav.modnav{display:flex;gap:2px;margin-inline-start:auto;flex-wrap:wrap}
nav.modnav button{font:inherit;font-size:13px;font-weight:500;color:var(--ink-soft);background:none;border:0;padding:8px 11px;border-radius:7px;cursor:pointer;white-space:nowrap}
nav.modnav button:hover{background:var(--paper-2);color:var(--ink)}
.btn-lang{font:inherit;font-weight:600;font-size:13px;color:var(--accent-ink);background:var(--card);border:1px solid var(--line-strong);
  padding:8px 12px;border-radius:8px;cursor:pointer;display:flex;align-items:center;gap:6px;white-space:nowrap}
.btn-lang:hover{background:var(--paper-2)}
.btn-quiz{font:inherit;font-weight:600;font-size:13px;color:#fff;background:var(--accent);border:0;padding:9px 15px;border-radius:8px;cursor:pointer;white-space:nowrap}
.btn-quiz:hover{background:var(--accent-ink)}
.search{display:flex;align-items:center;gap:7px;background:var(--card);border:1px solid var(--line-strong);border-radius:8px;padding:7px 11px;min-width:170px}
.search input{border:0;background:none;font:inherit;font-size:13px;color:var(--ink);width:100%;outline:none}
.search svg{flex:none;color:var(--ink-soft)}

.hero{padding:46px 0 30px}
.eyebrow{font-family:var(--mono);font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--accent-ink);margin-bottom:14px}
[dir="rtl"] .eyebrow{letter-spacing:0}
.hero h1{font-family:var(--disp);font-weight:600;font-size:clamp(30px,5vw,50px);line-height:1.08;letter-spacing:-.02em;margin:0 0 14px}
.hero p{font-size:16px;color:var(--ink-soft);max-width:60ch;margin:0}
.legend{display:flex;gap:8px;flex-wrap:wrap;margin-top:24px}
.legend .chip{font-family:var(--mono);font-size:12px;display:flex;align-items:center;gap:7px;background:var(--card);border:1px solid var(--line);padding:6px 11px;border-radius:20px}
[dir="rtl"] .legend .chip{font-family:var(--body)}
.legend .dot{width:10px;height:10px;border-radius:50%}
.stats{display:flex;gap:26px;margin-top:26px;flex-wrap:wrap}
.stat b{font-family:var(--disp);font-size:26px;font-weight:600;display:block;line-height:1}
.stat span{font-size:12px;color:var(--ink-soft);font-family:var(--mono)}
[dir="rtl"] .stat span{font-family:var(--body)}

.module{margin:34px 0}
.module-head{display:flex;align-items:baseline;gap:14px;border-bottom:1px solid var(--line-strong);padding-bottom:10px;margin-bottom:18px}
.module-head .num{font-family:var(--mono);font-size:13px;color:var(--accent-ink)}
.module-head h2{font-family:var(--disp);font-weight:600;font-size:22px;margin:0}
.module-head em{font-style:normal;color:var(--ink-soft);font-size:13px;margin-inline-start:auto}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(232px,1fr));gap:14px}
.topic-card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:17px 18px;cursor:pointer;
  transition:transform .12s,box-shadow .12s,border-color .12s;position:relative;overflow:hidden}
.topic-card:hover{transform:translateY(-2px);box-shadow:var(--shadow);border-color:var(--line-strong)}
.topic-card .accent-line{position:absolute;inset-inline-start:0;top:0;bottom:0;width:4px}
.topic-card h3{font-family:var(--disp);font-weight:600;font-size:17px;margin:0 0 4px;padding-inline-start:6px}
.topic-card p{font-size:12.5px;color:var(--ink-soft);margin:0 0 12px;padding-inline-start:6px}
.topic-card .meta{display:flex;gap:12px;font-family:var(--mono);font-size:11px;color:var(--ink-soft);padding-inline-start:6px}
[dir="rtl"] .topic-card .meta{font-family:var(--body)}
.topic-card .meta span{display:flex;align-items:center;gap:4px}
.badge-done{position:absolute;top:12px;inset-inline-end:12px;font-family:var(--mono);font-size:10px;color:var(--good);background:var(--good-bg);padding:2px 7px;border-radius:10px}

.detail-head{padding:34px 0 0}
.back{font:inherit;font-size:13px;font-family:var(--mono);color:var(--accent-ink);background:none;border:0;cursor:pointer;padding:0;display:inline-flex;align-items:center;gap:6px;margin-bottom:16px}
[dir="rtl"] .back{font-family:var(--body)}
.back:hover{text-decoration:underline}
.detail-head h1{font-family:var(--disp);font-weight:600;font-size:clamp(26px,4vw,38px);letter-spacing:-.02em;margin:0 0 6px}
.detail-head .sub{color:var(--ink-soft);font-size:15px;margin:0}
.tabs{display:flex;gap:4px;margin:24px 0 8px;border-bottom:1px solid var(--line-strong)}
.tabs button{font:inherit;font-weight:600;font-size:14px;color:var(--ink-soft);background:none;border:0;padding:11px 16px;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px}
.tabs button.active{color:var(--ink);border-bottom-color:var(--accent)}
.tabs button:hover{color:var(--ink)}
.panel{padding:22px 0 60px;animation:fade .25s ease}
@keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}

/* notes + term rail */
.notes-layout{display:grid;grid-template-columns:1fr 288px;gap:22px;align-items:start}
.note-block{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:20px 22px;margin-bottom:14px}
.note-block h4{font-family:var(--disp);font-weight:600;font-size:16px;margin:0 0 12px;display:flex;align-items:center;gap:9px}
.note-block h4::before{content:"";width:8px;height:8px;border-radius:2px;background:var(--accent);flex:none;transform:rotate(45deg)}
.note-block ul{margin:0;padding:0;list-style:none}
.note-block li{position:relative;padding:5px 0 5px 20px;font-size:14.5px;border-bottom:1px dotted var(--line)}
[dir="rtl"] .note-block li{padding:5px 20px 5px 0}
.note-block li:last-child{border-bottom:0}
.note-block li::before{content:"›";position:absolute;inset-inline-start:2px;top:5px;color:var(--line-strong);font-weight:700}
[dir="rtl"] .note-block li::before{content:"‹"}
.notes-toolbar{margin-bottom:16px}
.btn-explain{font:inherit;font-weight:600;font-size:13.5px;color:var(--accent-ink);background:var(--card);border:1px solid var(--line-strong);padding:10px 15px;border-radius:9px;cursor:pointer;display:inline-flex;align-items:center;gap:8px;transition:background .15s,color .15s,border-color .15s}
.btn-explain:hover{background:var(--paper-2)}
.btn-explain.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-explain svg{flex:none}
.teach{background:var(--teach-bg,#eef4f3);border:1px solid var(--teach-line,#cfe1de);border-inline-start:3px solid var(--accent);border-radius:0 10px 10px 0;padding:12px 15px;margin:0 0 13px;animation:teachIn .18s ease}
[dir="rtl"] .teach{border-radius:10px 0 0 10px}
@keyframes teachIn{from{opacity:0;transform:translateY(-3px)}to{opacity:1;transform:none}}
.teach-tag{font-family:var(--mono);font-size:10.5px;letter-spacing:.09em;text-transform:uppercase;color:var(--accent-ink);margin-bottom:6px;display:flex;align-items:center;gap:6px;font-weight:600}
[dir="rtl"] .teach-tag{font-family:var(--body);letter-spacing:0}
.teach p{margin:0;font-size:14px;line-height:1.62;color:var(--ink)}
.t-nerve{color:var(--nerve);font-weight:600}.t-artery{color:var(--artery);font-weight:600}
.t-vein{color:var(--vein);font-weight:600}.t-bone{color:var(--bone);font-weight:600}
.t-muscle{color:var(--muscle);font-weight:600}.t-key{color:var(--key);font-weight:700}
.t-clin{background:#f6efe0;border-inline-start:3px solid var(--nerve);padding:2px 7px;border-radius:0 4px 4px 0;display:inline-block;font-size:13.5px}

.term-rail{position:sticky;top:80px;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px 16px 18px}
.rail-title{font-family:var(--mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--accent-ink);margin-bottom:4px}
[dir="rtl"] .rail-title{font-family:var(--body);letter-spacing:0;font-weight:700}
.rail-hint{font-size:11.5px;color:var(--ink-soft);margin-bottom:12px}
.term-detail{background:var(--paper);border:1px solid var(--line-strong);border-radius:10px;padding:12px 13px;margin-bottom:12px;animation:fade .2s}
.term-detail .td-term{font-family:var(--disp);font-weight:600;font-size:15px;display:flex;align-items:center;gap:8px;margin-bottom:5px}
.term-detail .td-dot{width:9px;height:9px;border-radius:50%;flex:none}
.term-detail .td-def{font-size:13px;color:var(--ink-soft);line-height:1.5}
.term-list{display:flex;flex-direction:column;gap:2px;max-height:none}
.term-chip{font:inherit;text-align:start;background:none;border:0;border-radius:8px;padding:8px 9px;cursor:pointer;
  display:flex;align-items:center;gap:9px;font-size:13.5px;color:var(--ink);width:100%}
.term-chip:hover{background:var(--paper-2)}
.term-chip.on{background:var(--paper-2)}
.term-chip .cdot{width:8px;height:8px;border-radius:50%;flex:none}
.term-chip small{color:var(--ink-soft);font-size:11px;margin-inline-start:auto;font-family:var(--mono)}
[dir="rtl"] .term-chip small{font-family:var(--body)}

/* flashcards */
.fc-tools{display:flex;align-items:center;gap:12px;margin-bottom:18px;flex-wrap:wrap}
.fc-count{font-family:var(--mono);font-size:13px;color:var(--ink-soft)}
[dir="rtl"] .fc-count{font-family:var(--body)}
.fc-stage{perspective:1600px;max-width:560px;margin:0 auto}
.flashcard{position:relative;width:100%;min-height:250px;cursor:pointer;transform-style:preserve-3d;transition:transform .5s cubic-bezier(.4,.2,.2,1)}
.flashcard.flip{transform:rotateY(180deg)}
.fc-face{position:absolute;inset:0;backface-visibility:hidden;border-radius:16px;padding:32px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;box-shadow:var(--shadow)}
.fc-front{background:var(--card);border:1px solid var(--line-strong)}
.fc-back{background:var(--ink);color:var(--paper);transform:rotateY(180deg);border:1px solid var(--ink)}
.fc-tag{font-family:var(--mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--accent-ink);margin-bottom:16px}
[dir="rtl"] .fc-tag{font-family:var(--body);letter-spacing:0}
.fc-back .fc-tag{color:var(--nerve)}
.fc-q{font-family:var(--disp);font-size:22px;font-weight:600;line-height:1.3}
.fc-a{font-size:16px;line-height:1.55}
.fc-a .t-nerve,.fc-a .t-artery,.fc-a .t-vein,.fc-a .t-muscle,.fc-a .t-bone{filter:brightness(1.35)}
.fc-hint{position:absolute;bottom:14px;left:0;right:0;text-align:center;font-size:11px;font-family:var(--mono);opacity:.55}
[dir="rtl"] .fc-hint{font-family:var(--body)}
.fc-nav{display:flex;align-items:center;justify-content:center;gap:14px;margin-top:20px}
.fc-nav button{font:inherit;font-size:14px;font-weight:600;background:var(--card);border:1px solid var(--line-strong);border-radius:9px;padding:10px 18px;cursor:pointer;color:var(--ink)}
.fc-nav button:hover{background:var(--paper-2)}
.fc-nav .pos{font-family:var(--mono);font-size:13px;color:var(--ink-soft);min-width:56px;text-align:center}
.mini{font-size:12px;font-weight:600;padding:8px 12px;border-radius:8px;border:1px solid var(--line-strong);background:var(--card);cursor:pointer;font-family:inherit;color:var(--ink)}
.mini:hover{background:var(--paper-2)}

/* quiz */
.quiz-config{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:26px;max-width:560px;margin:0 auto}
.quiz-config h3{font-family:var(--disp);font-weight:600;font-size:20px;margin:0 0 6px}
.quiz-config p{color:var(--ink-soft);font-size:14px;margin:0 0 20px}
.qopt{margin-bottom:18px}
.qopt label{font-family:var(--mono);font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-soft);display:block;margin-bottom:8px}
[dir="rtl"] .qopt label{font-family:var(--body);letter-spacing:0}
.seg{display:flex;gap:6px;flex-wrap:wrap}
.seg button{font:inherit;font-size:13px;font-weight:500;border:1px solid var(--line-strong);background:var(--paper);padding:8px 14px;border-radius:8px;cursor:pointer;color:var(--ink)}
.seg button.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.q-card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:26px;max-width:640px;margin:0 auto}
.q-progress{height:5px;background:var(--paper-2);border-radius:3px;overflow:hidden;margin-bottom:22px}
.q-progress i{display:block;height:100%;background:var(--accent);transition:width .3s ease}
.q-meta{display:flex;justify-content:space-between;font-family:var(--mono);font-size:12px;color:var(--ink-soft);margin-bottom:12px}
[dir="rtl"] .q-meta{font-family:var(--body)}
.q-text{font-family:var(--disp);font-weight:600;font-size:20px;line-height:1.35;margin-bottom:20px}
.opts{display:flex;flex-direction:column;gap:10px}
.opt{text-align:start;font:inherit;font-size:15px;background:var(--paper);border:1.5px solid var(--line-strong);border-radius:10px;padding:14px 16px;cursor:pointer;display:flex;gap:12px;align-items:flex-start;color:var(--ink);transition:.12s}
.opt:hover:not(:disabled){border-color:var(--accent);background:#fff}
.opt .key{font-family:var(--mono);font-weight:600;color:var(--ink-soft);flex:none}
.opt.correct{background:var(--good-bg);border-color:var(--good);color:#255938}
.opt.correct .key{color:var(--good)}
.opt.wrong{background:var(--bad-bg);border-color:var(--bad);color:#7d2530}
.opt.wrong .key{color:var(--bad)}
.opt:disabled{cursor:default}
.explain{margin-top:18px;padding:14px 16px;border-radius:10px;font-size:14px;line-height:1.55;background:#f6efe0;border-inline-start:3px solid var(--nerve);animation:fade .25s}
.explain b{font-family:var(--mono);font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--muscle);display:block;margin-bottom:4px}
[dir="rtl"] .explain b{font-family:var(--body);letter-spacing:0}
.q-next{margin-top:20px;display:flex;justify-content:flex-end}
.q-next button{font:inherit;font-weight:600;font-size:14px;background:var(--accent);color:#fff;border:0;padding:11px 22px;border-radius:9px;cursor:pointer}
.q-next button:hover{background:var(--accent-ink)}
.q-next button:disabled{opacity:.4;cursor:not-allowed}
.result{text-align:center;max-width:560px;margin:0 auto;background:var(--card);border:1px solid var(--line);border-radius:16px;padding:38px 30px}
.score-ring{width:150px;height:150px;margin:0 auto 20px;position:relative}
.score-ring svg{transform:rotate(-90deg)}
.score-ring .pct{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.score-ring .pct b{font-family:var(--disp);font-size:38px;font-weight:600;line-height:1}
.score-ring .pct span{font-family:var(--mono);font-size:11px;color:var(--ink-soft)}
.result h3{font-family:var(--disp);font-size:24px;font-weight:600;margin:0 0 6px}
.result p{color:var(--ink-soft);margin:0 0 22px}
.result-actions{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.review-list{margin-top:28px;text-align:start}
.review-list h4{font-family:var(--disp)}
.review-item{background:var(--paper);border:1px solid var(--line);border-radius:10px;padding:14px 16px;margin-bottom:10px;font-size:14px}
.review-item .rtop{font-family:var(--mono);font-size:11px;color:var(--accent-ink);text-transform:uppercase;letter-spacing:.06em}
[dir="rtl"] .review-item .rtop{font-family:var(--body);letter-spacing:0}
.review-item .rq{font-weight:600;margin:3px 0 6px}
.review-item .ra{font-size:13px}
.review-item .ra .mine{color:var(--bad)}
.review-item .ra .right{color:var(--good)}

.search-results{padding:30px 0 60px}
.sr-item{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:14px 18px;margin-bottom:10px;cursor:pointer}
.sr-item:hover{border-color:var(--accent)}
.sr-item .sr-topic{font-family:var(--mono);font-size:11px;color:var(--accent-ink);text-transform:uppercase;letter-spacing:.06em}
[dir="rtl"] .sr-item .sr-topic{font-family:var(--body);letter-spacing:0}
.sr-item h4{font-family:var(--disp);margin:3px 0 0;font-size:16px;font-weight:600}

footer{border-top:1px solid var(--line);padding:26px 0 40px;color:var(--ink-soft);font-size:13px}
footer a{color:var(--accent-ink)}
.hidden{display:none!important}
@media(max-width:820px){.notes-layout{grid-template-columns:1fr}.term-rail{position:static;order:-1}}
@media(max-width:640px){
  .bar{height:auto;padding:10px 0;flex-wrap:wrap;gap:10px}
  .search{order:4;width:100%}nav.modnav{margin-inline-start:0;order:3;width:100%}
  .btn-lang,.btn-quiz{order:2}
}
</style>
</head>
<body>
<header>
  <div class="wrap bar">
    <div class="brand" onclick="go('home')"><b id="brandName">Atlas Review</b><span id="brandTag">ANATOMY&nbsp;2</span></div>
    <nav class="modnav" id="modnav"></nav>
    <button class="btn-lang" onclick="toggleLang()" id="langBtn">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3c2.5 2.7 2.5 15.3 0 18M12 3c-2.5 2.7-2.5 15.3 0 18"/></svg>
      <span id="langLabel">عربي</span>
    </button>
    <div class="search">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
      <input id="searchbox" autocomplete="off">
    </div>
    <button class="btn-quiz" onclick="startExam()" id="examBtn">Exam Mode</button>
  </div>
</header>

<main id="app" class="wrap"></main>

<footer class="wrap" id="footer"></footer>

<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
